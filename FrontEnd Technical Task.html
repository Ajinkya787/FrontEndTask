    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        /* Hide the default radio button */
        input[type="radio"] {
            display: none;
        }
        /* Style the custom radio button */
        .radio-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #a3a3a3;
            transition: all 0.2s ease-in-out;
            flex-shrink: 0;
        }
        /* Style the radio button when its corresponding input is checked */
        input[type="radio"]:checked + label .radio-circle {
            border-color: #4CAF50;
            background-color: #4CAF50;
            position: relative;
        }
        /* Inner dot for the checked radio button */
        input[type="radio"]:checked + label .radio-circle::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        /* Hide the size/color selectors by default */
        .selectors {
            display: none;
        }
    </style>
</head>

            +Add to Cart
        </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bundleOptions = document.querySelectorAll('.bundle-option-card');
            const totalPriceElement = document.getElementById('total-price');
            const addToCartBtn = document.getElementById('addToCartBtn');

            function updateUI() {
                bundleOptions.forEach(card => {
                    const radio = card.querySelector('input[type="radio"]');
                    const selectors = card.querySelector('.selectors');
                    const isChecked = radio.checked;

                    if (isChecked) {
                        card.classList.add('border-green-500', 'shadow-md', 'bg-gray-100');
                        card.classList.remove('border-gray-300', 'bg-white');
                        selectors.style.display = 'block';

                        const price = parseFloat(card.dataset.price);
                        totalPriceElement.textContent = `DKK ${price.toFixed(2)}`;
                    } else {
                        card.classList.remove('border-green-500', 'shadow-md', 'bg-gray-100');
                        card.classList.add('border-gray-300', 'bg-white');
                        selectors.style.display = 'none';
                    }
                });
            }

            // Add click listeners to the cards to select the radio button
            bundleOptions.forEach(card => {
                card.addEventListener('click', () => {
                    card.querySelector('input[type="radio"]').checked = true;
                    updateUI();
                });
            });

            // Initial UI update
            updateUI();

            // Add to Cart button functionality
            addToCartBtn.addEventListener('click', () => {
                const selectedBundle = document.querySelector('input[name="bundle"]:checked');
                if (selectedBundle) {
                    const selectedCard = selectedBundle.closest('.bundle-option-card');
                    const price = selectedCard.dataset.price;
                    const confirmationMessage = `Added bundle for DKK ${price} to cart.`;
                    
                    const selectedSizes = [];
                    const selectedColors = [];
                    selectedCard.querySelectorAll('select').forEach(select => selectedSizes.push(select.value));
                    selectedCard.querySelectorAll('input[type="color"]').forEach(input => selectedColors.push(input.value));
                    
                    console.log('Selected Sizes:', selectedSizes);
                    console.log('Selected Colors:', selectedColors);

                    const messageBox = document.createElement('div');
                    messageBox.className = 'fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white text-gray-800 p-6 rounded-lg shadow-xl border-t-4 border-green-500 z-50 transition-transform duration-300';
                    messageBox.innerHTML = `
                        <h3 class="font-bold text-lg mb-2">Success!</h3>
                        <p>${confirmationMessage}</p>
                        <button onclick="this.parentElement.remove()" class="mt-4 px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600">Close</button>
                    `;
                    document.body.appendChild(messageBox);
                }
            });
        });
    </script>
